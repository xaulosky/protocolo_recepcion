server {
    listen 80;
    server_name administracion.cialo.cl;
    # certbot añadirá el bloque SSL automáticamente
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name administracion.cialo.cl;

    # SSL — gestionado por certbot (no editar manualmente)
    ssl_certificate     /etc/letsencrypt/live/administracion.cialo.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/administracion.cialo.cl/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend — archivos estáticos de React
    root  /var/www/cialo-hub/app/dist;
    index index.html;

    # SPA: cualquier ruta no encontrada sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy inverso al puerto 4000 (Fastify)
    # El prefijo /api se elimina antes de pasar al backend
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
